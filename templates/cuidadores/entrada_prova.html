<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Identificação - GestonCuid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0 p-4">
                    <h2 class="text-center fw-bold mb-4 text-success">Identificação B2B</h2>
                    <p class="text-center text-muted small">Insira os dados da sua empresa para iniciar a avaliação técnica.</p>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nome do Responsável</label>
                            <input type="text" name="nome" class="form-control" required placeholder="Ex: Ana Moura">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">CNPJ da Empresa</label>
                            <input type="text" name="cnpj" class="form-control" required placeholder="00.000.000/0000-00">
                        </div>

                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-danger">{{ message }}</div>
                            {% endfor %}
                        {% endif %}

                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Iniciar Prova</button>
                    </form>
                    
                    <div class="text-center mt-3">
                        <a href="{% url 'home' %}" class="text-decoration-none text-muted small">← Voltar ao início</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
