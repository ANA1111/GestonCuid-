<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Revisar Documentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow border-0 p-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">Homologação de Parceiro</h2>
                <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Voltar</a>
            </div>
            <hr>
            <form method="POST">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-7 border-end">
                        <h5 class="text-primary fw-bold mb-4">1. Documentos Recebidos</h5>
                        <div class="p-4 bg-white border rounded shadow-sm mb-3 text-center">
                            <p class="fw-bold mb-1">Certificado MEI</p>
                            {% if cuidador.doc_mei %}
                                <a href="{{ cuidador.doc_mei.url }}" target="_blank" class="btn btn-danger"><i class="bi bi-file-pdf"></i> Visualizar PDF</a>
                            {% else %}<span class="badge bg-secondary">Não Enviado</span>{% endif %}
                        </div>
                        <div class="p-4 bg-white border rounded shadow-sm text-center">
                            <p class="fw-bold mb-1">Antecedentes Criminais</p>
                            {% if cuidador.doc_antecedentes %}
                                <a href="{{ cuidador.doc_antecedentes.url }}" target="_blank" class="btn btn-danger"><i class="bi bi-file-pdf"></i> Visualizar PDF</a>
                            {% else %}<span class="badge bg-secondary">Não Enviado</span>{% endif %}
                        </div>
                    </div>
                    <div class="col-md-5 ps-5">
                        <h5 class="text-success fw-bold mb-4">2. Decisão do Gestor</h5>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Situação MEI</label>
                            <select name="status_mei" class="form-select form-select-lg">
                                <option value="Pendente" {% if cuidador.status_mei == 'Pendente' %}selected{% endif %}>Em Análise</option>
                                <option value="Ativo" {% if cuidador.status_mei == 'Ativo' %}selected{% endif %}>Aprovado (Ativo)</option>
                                <option value="Irregular" {% if cuidador.status_mei == 'Irregular' %}selected{% endif %}>Reprovado (Irregular)</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Antecedentes Criminais</label>
                            <select name="status_ante" class="form-select form-select-lg">
                                <option value="Pendente" {% if cuidador.status_antecedentes == 'Pendente' %}selected{% endif %}>Em Análise</option>
                                <option value="Aprovado" {% if cuidador.status_antecedentes == 'Aprovado' %}selected{% endif %}>Nada Consta (Aprovado)</option>
                                <option value="Reprovado" {% if cuidador.status_antecedentes == 'Reprovado' %}selected{% endif %}>Com Ocorrência (Reprovado)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success btn-lg w-100 py-3 fw-bold shadow">Salvar e Atualizar Status</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
