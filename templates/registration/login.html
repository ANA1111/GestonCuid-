<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo - GestonCuid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); min-height: 100vh; display: flex; align-items: center; }
        .login-card { border-radius: 25px; border: none; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .btn-login { background: #1e3a8a; border: none; padding: 12px; border-radius: 12px; font-weight: bold; transition: 0.3s; }
        .btn-login:hover { background: #1e40af; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card login-card p-4">
                    <div class="text-center mb-4">
                        <div class="bg-primary-subtle text-primary d-inline-block p-3 rounded-circle mb-3">
                            <i class="bi bi-shield-lock-fill fs-1"></i>
                        </div>
                        <h3 class="fw-bold text-dark">Gestão Interna</h3>
                        <p class="text-muted small">Acesse o painel de controle</p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="form-floating mb-3">
                            <input type="text" name="username" class="form-control" id="u" placeholder="Usuário" required>
                            <label for="u">Usuário</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" name="password" class="form-control" id="p" placeholder="Senha" required>
                            <label for="p">Senha</label>
                        </div>
                        
                        {% if form.errors %}
                        <div class="alert alert-danger small py-2">Usuário ou senha incorretos.</div>
                        {% endif %}

                        <button type="submit" class="btn btn-primary w-100 btn-login shadow">ENTRAR NO SISTEMA</button>
                    </form>
                    
                    <hr>
                    <div class="text-center">
                        <a href="{% url 'home' %}" class="btn btn-link text-decoration-none text-muted small">
                            <i class="bi bi-arrow-left"></i> Voltar para o Início
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
